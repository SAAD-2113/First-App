<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#dc2626" />
    <title>The Flash</title>
    
    <!-- Mobile Web App Capability (Standalone / Fullscreen Support) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="The Flash" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered successfully!', reg))
            .catch(err => console.log('Service Worker registration failed:', err));
        });
      }
    </script>

    <script>
      (function() {
        try {
          var currentFetch = window.fetch || (typeof globalThis !== 'undefined' ? globalThis.fetch : undefined);
          var getter = function() {
            return currentFetch;
          };
          var setter = function(newValue) {
            currentFetch = newValue;
          };
          
          if (window) {
            Object.defineProperty(window, 'fetch', {
              get: getter,
              set: setter,
              configurable: true,
              enumerable: true
            });
          }
          if (typeof globalThis !== 'undefined') {
            Object.defineProperty(globalThis, 'fetch', {
              get: getter,
              set: setter,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Failed to define fetch getter/setter:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
